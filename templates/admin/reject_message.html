<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Reject Request</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        danger: {
                            50: '#fef2f2',
                            100: '#fee2e2',
                            600: '#dc2626',
                            700: '#b91c1c',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 font-sans text-gray-800">

    <!-- Main Card Container -->
    <main class="bg-white max-w-2xl w-full rounded-xl shadow-lg border border-gray-200 overflow-hidden">
        
        <!-- Header -->
        <header class="bg-danger-50 border-b border-danger-100 px-6 py-5 flex items-center gap-3">
            <div class="bg-danger-100 text-danger-600 p-2 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <div>
                <h1 class="text-xl font-bold text-gray-900">Reject Application / Request</h1>
                <p class="text-sm text-danger-700 mt-0.5">This action will notify the user immediately.</p>
            </div>
        </header>

        <form action="#" method="POST">
            {% csrf_token %}
            <div class="p-6 space-y-6">
                
               

                <!-- Message Text Area -->
                <div>
                    <label for="message" class="block text-sm font-semibold text-gray-900 mb-2">Message to User</label>
                    <p class="text-xs text-gray-500 mb-2">This message will be sent via SMS and Email.</p>
                    <div class="relative">
                        <textarea 
                            id="message" 
                            name="message" 
                            rows="6" 
                            class="block w-full rounded-md border border-gray-300 p-3 text-sm text-gray-900 shadow-sm focus:border-danger-600 focus:ring-1 focus:ring-danger-600 outline-none transition-colors resize-y"
                            placeholder="Type your detailed explanation here..."
                            required
                        ></textarea>
                    </div>
                </div>

            </div>

            <!-- Action Buttons -->
            <div class="bg-gray-50 border-t border-gray-200 px-6 py-4 flex items-center justify-end gap-3">
                <button type="button" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 transition-colors">
                    Cancel
                </button>
                <button type="submit" class="inline-flex items-center gap-2 px-5 py-2 text-sm font-medium text-white bg-danger-600 border border-transparent rounded-lg shadow-sm hover:bg-danger-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-danger-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                    </svg>
                    Send Rejection
                </button>
            </div>
        </form>
    </main>

</body>
</html>
